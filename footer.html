<script>
    // --- A. モバイルメニュー開閉関数 ---
    window.toggleMobileMenu = function() {
        var menu = document.getElementById('mobile-menu-overlay');
        if (!menu) return;

        menu.classList.toggle('active');

        if(menu.classList.contains('active')) {
            document.body.classList.add('menu-open');
            document.body.style.overflow = 'hidden';
        } else {
            document.body.classList.remove('menu-open');
            document.body.style.overflow = '';
        }
    };

    // --- B. ページ読み込み後の処理 ---
    document.addEventListener('DOMContentLoaded', function() {
        
        // -------------------------------------------------
        // 1. スマホ用ボトムナビのTOPボタン
        // -------------------------------------------------
        const mobileTopBtn = document.getElementById('scroll-top-button');
        if (mobileTopBtn) {
            mobileTopBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // -------------------------------------------------
        // 2. PC用トップへ戻るボタン (ここを追加！)
        // -------------------------------------------------
        const pcTopBtn = document.getElementById('pc-back-to-top');
        
        if (pcTopBtn) {
            // クリックしたら戻る
            pcTopBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // スクロールしたら表示/非表示を切り替える
            window.addEventListener('scroll', function() {
                // 300px以上スクロールしたら表示
                if (window.scrollY > 300) {
                    pcTopBtn.classList.add('show');
                } else {
                    pcTopBtn.classList.remove('show');
                }
            });
        }
    });
</script>

<script>
// ==========================================
// 1. 全てのクリックイベントを一括管理（イベント委譲）
// ==========================================
document.addEventListener('click', function (e) {

    // A. メインヘッダー全体の開閉（トグルボタン）
    const headerToggle = e.target.closest('#header-toggle-btn');

    if (headerToggle) {
        const wrapper = document.getElementById('score-wrapper');
        if (wrapper) {
            // ラッパーの開閉切り替え
            const isCollapsed = wrapper.classList.toggle('is-collapsed');
            
            // ★ボタンの見た目も切り替え（赤⇔黒）
            headerToggle.classList.toggle('is-collapsed', isCollapsed);
            
            // 状態を保存
            localStorage.setItem('headerCollapsed', isCollapsed);
            
            if (typeof adjustBodyPadding === 'function') {
                adjustBodyPadding();
            }
        }
        return;
    }

    // B. ロースター（選手名鑑）の開閉
    const playerToggle = e.target.closest('.player-toggle');
    if (playerToggle) {
        const sub = playerToggle.querySelector('.player-sub');
        if (sub) {
            const isOpen = sub.style.maxHeight;
            sub.style.maxHeight = isOpen ? null : sub.scrollHeight + 'px';
            sub.style.opacity = isOpen ? '0' : '1';
        }
        return;
    }

    // C. 凡例ボックス/フィルターの開閉
    const legendHeader = e.target.closest('.legend-header');
    if (legendHeader) {
        e.preventDefault();
        const box = legendHeader.closest('.legend-box, .filter-toggle');
        const content = box ? box.querySelector('.legend-content') : null;
        if (box && content) {
            const isOpen = box.getAttribute('aria-expanded') === 'true';
            content.style.maxHeight = isOpen ? '0px' : content.scrollHeight + 'px';
            content.style.opacity = isOpen ? '0' : '1';
            box.setAttribute('aria-expanded', !isOpen);
        }
        return;
    }

    // D. 戦績バーの開閉（リアルタイム同期版）
    const recordBtn = e.target.closest('.jax-record-main');
    if (recordBtn) {
        const recordBar = document.getElementById('jax-record-bar');
        if (recordBar) {
            const isOpen = recordBar.classList.toggle('is-open');
            recordBtn.setAttribute('aria-expanded', isOpen);
            let start = null;
            function sync(t) {
                if (!start) start = t;
                adjustBodyPadding(); 
                if (t - start < 350) requestAnimationFrame(sync);
            }
            requestAnimationFrame(sync);
        }
        return;
    }
    
    // E. 目次の開閉（ここを新しく追加！）
    const tocLabel = e.target.closest('.toc-label');
    if (tocLabel) {
        const toc = document.querySelector('.table-of-contents');
        if (toc) {
            // ラベルの矢印アイコン回転用
            tocLabel.classList.toggle('open');
            // 目次本体の開閉用
            toc.classList.toggle('is-open'); 
        }
        return;
    }
});

// ==========================================
// 2. ページ読み込み時の初期化
// ==========================================
document.addEventListener('DOMContentLoaded', function () {
    const wrapper = document.getElementById('score-wrapper');
    const btn = document.getElementById('header-toggle-btn'); // ★ボタン要素も取得
    
    // --- 記憶に基づいたヘッダー状態の復元 ---
    const headerState = localStorage.getItem('headerCollapsed');
    
    if (headerState === 'true') {
        // 1. ヘッダーを閉じる
        if (wrapper) {
            wrapper.classList.add('is-collapsed');
        }
        
        // 2. ★ボタンも「閉じた状態（黒・＋）」にする
        if (btn) {
            btn.classList.add('is-collapsed');
        }
    }
    
    // 必要なら本文のパディング調整などもここで実行
    if (typeof adjustBodyPadding === 'function') {
        adjustBodyPadding();
    }
    
    // --- 目次のアコーディオン化用DOM構築（ここを新しく追加！） ---
    const toc = document.querySelector('.table-of-contents');
    if (toc) {
        const toggleBlock = document.createElement('div');
        toggleBlock.className = 'toc-toggle-block';
        // P5風に英字にするのもカッコいいから "CONTENTS" にしてみたよ！
        toggleBlock.innerHTML = '<div class="toc-label">CONTENTS <span class="toc-icon">▼</span></div>';
        toc.parentNode.insertBefore(toggleBlock, toc);
    }

    // --- 年齢・NFLキャリア年数計算 ---
    const today = new Date();
    document.querySelectorAll('.player-age').forEach(el => {
        const birth = new Date(el.dataset.birthday);
        if(isNaN(birth)) return; // エラー回避
        let age = today.getFullYear() - birth.getFullYear();
        if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
        const m = (today.getMonth() - birth.getMonth() + 12) % 12;
        el.innerHTML = `${age}<span style="font-size: 80%;">.${m}</span>歳`;
    });
    document.querySelectorAll('.player-year').forEach(el => {
        const entryYear = parseInt(el.dataset.entry, 10);
        if(isNaN(entryYear)) return; // エラー回避
        const exp = today.getFullYear() - entryYear;
        el.innerHTML = (exp === 0) ? '(R)' : `(${exp})`;
    });

    // --- 前のページボタン ---
    const pager = document.querySelector(".pager");
    if (pager && location.search.indexOf("?page=") === 0) {
        const a = document.createElement('a');
        a.onclick = () => history.back();
        a.innerHTML = "前のページ";
        a.setAttribute("href", "javascript:void(0);");
        const span = document.createElement('span');
        span.className = 'pager-prev';
        span.appendChild(a);
        pager.insertBefore(span, pager.firstChild);
    }

    // --- データ読み込み開始 ---
    fetchJAXHeaderData();
    adjustBodyPadding();
});

// ==========================================
// 3. システム関数（取得・制御）
// ==========================================

// ヘッダーデータの取得
function fetchJAXHeaderData() {
    // スコア・戦績
    fetch('/schedule-latest').then(res => res.text()).then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const source = doc.querySelector('.entry-content') || doc.querySelector('.page-entry-content');
        if (source) {
            const newScore = source.querySelector('#score-bar');
            const newRecord = source.querySelector('#jax-record-bar');
            if (newScore) document.getElementById('score-bar').innerHTML = newScore.innerHTML;
            if (newRecord) document.getElementById('jax-record-bar').innerHTML = newRecord.innerHTML;
            setTimeout(initCarouselLogic, 10);
        }
    }).catch(err => console.log('Header data fetch error', err)); // エラーハンドリング追加

    // ニュース（See More含む）
    fetch('/news-latest').then(res => res.text()).then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const items = doc.querySelectorAll('.news-item');
        const list = document.getElementById('dynamic-news-bar');
        if (items.length > 0 && list) {
            let h = "";
            items.forEach(item => {
                const dateEl = item.querySelector(".news-item-date");
                const typeEl = item.querySelector(".news-item-type");
                const titleEl = item.querySelector(".news-item-title");
                
                if(dateEl && typeEl && titleEl) {
                    const date = dateEl.textContent.split("/").slice(1).join("/");
                    const typeClass = item.dataset.type;
                    const typeText = typeEl.textContent;
                    const title = titleEl.textContent;
                    const href = titleEl.href;
                    h += `<li class="newsbar-b-item"><span class="newsbar-b-date">${date}</span><span class="newsbar-b-type newsbar-b-type--${typeClass}">${typeText}</span><a href="${href}" class="newsbar-b-title">${title}</a></li>`;
                }
            });
            h += `<li class="newsbar-b-item"><a href="/news" class="newsbar-b-more-link">See More</a></li>`;
            list.innerHTML = h + h;
            startNewsScroll();
        }
    }).catch(err => console.log('News fetch error', err));
}

// カルーセル制御
function initCarouselLogic() {
    const vn = document.querySelector(".schedule-carousel-viewport");
    const carousel = document.querySelector(".schedule-carousel");
    const slides = document.querySelectorAll(".schedule-slide");
    if (!carousel || slides.length === 0) return;

    let index = 0;
    let minDiff = Infinity;
    const now = new Date();
    slides.forEach((slide, i) => {
        const dateStr = slide.dataset.date;
        if (dateStr) {
            const date = new Date(dateStr);
            const diff = Math.abs(date - now);
            if (diff < minDiff) { minDiff = diff; index = i; }
        }
    });

   // JS内の update関数部分を修正
    const update = () => {
        // ★修正: 固定値(200)をやめて、実際の要素から幅を計算する
        // カードの幅を取得
        const slideWidth = slides[0].offsetWidth;
        
        // CSSで設定した gap (15px) を取得（計算済みスタイルから）
        const style = window.getComputedStyle(carousel);
        const gap = parseFloat(style.columnGap || style.gap || 0);
    
        // 1回に動かす距離 = カード幅 + 隙間
        const step = slideWidth + gap;
    
        // センター合わせの計算
        // (ビューポートの幅 - カード1枚分の幅) / 2 = 端の余白
        const centerOffset = (vn.offsetWidth - slideWidth) / 2;
    
        // 現在のインデックス分だけ左へずらし、センター補正を足す
        const offset = -(index * step) + centerOffset;

        carousel.style.transition = "transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)";
        carousel.style.transform = `translateX(${offset}px)`;
    };

    const prev = document.querySelector(".schedule-prev");
    const next = document.querySelector(".schedule-next");
    
    
    if (prev) prev.onclick = () => { index = (index - 1 + slides.length) % slides.length; update(); };
    if (next) next.onclick = () => { index = (index + 1) % slides.length; update(); };

    let startX = 0;
    if(vn) {
        vn.addEventListener("touchstart", e => { startX = e.changedTouches[0].screenX; }, {passive: true});
        vn.addEventListener("touchend", e => {
            const endX = e.changedTouches[0].screenX;
            if (endX < startX - 30) { index = (index + 1) % slides.length; update(); }
            else if (endX > startX + 30) { index = (index - 1 + slides.length) % slides.length; update(); }
        }, {passive: true});
    }

    update();
    window.addEventListener('resize', update);
}

// ニューススクロール関数（修正版）
function startNewsScroll() {
    const vn = document.querySelector(".newsbar-b-viewport");
    const ln = document.querySelector(".js-newsbar-b-list");
    if (!vn || !ln) return;

    // 半分の位置（ループの折り返し地点）
    // ※ flexboxの場合、scrollWidthが正しく取れるよう少し待つか、余裕を持たせる
    let originalWidth = ln.scrollWidth / 2;

    // 初期化
    let interacting = false;
    let timer = null;
    let animationId = null;
    
    // 現在のスクロール速度
    const speed = 0.8; // 好みで速度調整 (0.5〜1.0くらい)

    const animate = () => {
        // ユーザーが触っていない時だけ自動スクロール
        if (!interacting) {
            // 現在の位置に速度を足す
            vn.scrollLeft += speed;

            // 半分を超えたら最初に戻す（無限ループ）
            // ※ 誤差吸収のため >= で判定
            if (vn.scrollLeft >= originalWidth) {
                vn.scrollLeft = vn.scrollLeft - originalWidth;
            }
        }
        animationId = requestAnimationFrame(animate);
    };

    // イベント: 触った時
    const stop = () => {
        interacting = true;
        if (timer) clearTimeout(timer);
        // アニメーションは回し続けるが、scrollLeftへの加算だけ止める
        // これにより、ユーザーのネイティブなスクロール操作と喧嘩しない
    };

    // イベント: 離した時
    const start = () => {
        // すぐ再開せず、少し余韻を残す（誤操作防止）
        timer = setTimeout(() => {
            interacting = false;
            // リサイズ等で幅が変わっている可能性があるので再取得
            originalWidth = ln.scrollWidth / 2;
        }, 1000); 
    };

    // イベントリスナー設定
    vn.addEventListener("touchstart", stop, { passive: true });
    vn.addEventListener("touchmove", stop, { passive: true }); // 追加: 動かしている間も止める
    vn.addEventListener("touchend", start, { passive: true });
    
    // PCのマウスホバー用
    vn.addEventListener("mouseenter", stop);
    vn.addEventListener("mouseleave", start);

    // アニメーション開始
    // 重複防止のため一度キャンセル
    if (vn.dataset.animId) cancelAnimationFrame(vn.dataset.animId);
    animate();
}

// 高さを測ってページ全体の余白を調整する関数
function adjustBodyPadding() {
    const wrapper = document.getElementById('score-wrapper');
    if (!wrapper) return;

    // 透過の判定（at-topクラス）
    wrapper.classList.toggle('at-top', window.scrollY < 10);

    let heightValue = 0;

    // 1. 閉じている場合は 0
    if (wrapper.classList.contains('is-collapsed')) {
        heightValue = 0;
    } 
    // 2. 開いている場合
    else {
        const scoreBar = document.getElementById('score-bar');
        // fetch前は、CSSの予約席を維持
        if (scoreBar && scoreBar.innerHTML.trim() === "") {
            const isMobile = window.innerWidth <= 768;
            heightValue = isMobile ? 140 : 155;
        } else {
            // データがあるなら実測値を採用
            heightValue = wrapper.offsetHeight;
        }
    }

    // CSS変数だけを更新
    document.documentElement.style.setProperty('--header-height', heightValue + 'px');
}

// イベント監視
window.addEventListener('resize', adjustBodyPadding);
window.addEventListener('scroll', adjustBodyPadding);
</script>
